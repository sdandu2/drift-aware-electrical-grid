# Source Profiles
# EIA is now the primary live grid source for the MVP.
active_profile: mvp_eia_pjm_rto


profiles:
  mvp_eia_pjm_rto:
    region_key: pjm_rto
    description: "MVP profile using EIA PJM balancing authority demand and representative PJM-region weather."
    load_source: eia
    weather_source: open_meteo
    alert_source: nws
    baseline_forecast_source: eia

  mvp_comed_chicago:
    region_key: comed
    description: "Future PJM Data Miner profile using ComEd load data and Chicago weather."
    load_source: pjm
    weather_source: open_meteo
    alert_source: nws
    baseline_forecast_source: pjm


# PJM Data Sources
# Kept as a future enhancement once PJM Data Miner API access is available.
pjm:
  enabled: false
  requires_account: true
  api_key_env_var: "PJM_API_KEY"
  base_url: "https://api.pjm.com/api/v1"

  timezone: "America/New_York"

  feeds:
    hourly_load_metered:
      enabled: true
      feed_name: "hrl_load_metered"
      description: "Historical metered hourly load. Future source for PJM zone-level training and evaluation."
      endpoint_path: "/hrl_load_metered"
      raw_output_subdir: "data/raw/pjm/hourly_load_metered"
      file_prefix: "pjm_hourly_load_metered"

    hourly_load_preliminary:
      enabled: true
      feed_name: "hrl_load_prelim"
      description: "Preliminary hourly load. Future source for recent PJM actuals and live dashboard updates."
      endpoint_path: "/hrl_load_prelim"
      raw_output_subdir: "data/raw/pjm/hourly_load_preliminary"
      file_prefix: "pjm_hourly_load_preliminary"

    instantaneous_load:
      enabled: true
      feed_name: "inst_load"
      description: "Approximate instantaneous load. Future source for live PJM UI display."
      endpoint_path: "/inst_load"
      raw_output_subdir: "data/raw/pjm/instantaneous_load"
      file_prefix: "pjm_instantaneous_load"

    seven_day_load_forecast:
      enabled: true
      feed_name: "load_frcstd_7_day"
      description: "PJM seven-day hourly load forecast. Future operational baseline comparison."
      endpoint_path: "/load_frcstd_7_day"
      raw_output_subdir: "data/raw/pjm/seven_day_load_forecast"
      file_prefix: "pjm_seven_day_load_forecast"

    historical_load_forecast:
      enabled: false
      feed_name: "load_frcstd_hist"
      description: "Historical PJM forecasts. Stretch goal for historical baseline comparison."
      endpoint_path: "/load_frcstd_hist"
      raw_output_subdir: "data/raw/pjm/historical_load_forecast"
      file_prefix: "pjm_historical_load_forecast"

  query_defaults:
    format: "json"
    row_count: 50000
    region_field: "area"
    timestamp_field: "datetime_beginning_ept"


# EIA Grid Data Sources
# EIA is the active MVP source for live and historical balancing-authority demand.
eia:
  enabled: true
  requires_account: true
  api_key_env_var: "EIA_API_KEY"
  base_url: "https://api.eia.gov/v2"
  description: "Primary live grid source for balancing-authority-level electricity demand data."

  electricity_rto:
    enabled: true
    route: "electricity/rto/region-data/data"
    description: "Hourly Electric Grid Monitor data for demand, forecast demand, and regional grid operations."
    raw_output_subdir: "data/raw/external_backup/eia"
    file_prefix: "eia_rto_region_data"

  query_defaults:
    frequency: "hourly"
    balancing_authority: "PJM"
    respondent: "PJM"
    data:
      - value

    facets:
      respondent:
        - PJM

    sort:
      - column: "period"
        direction: "desc"

    offset: 0
    length: 5000

  raw_output_subdir: "data/raw/external_backup/eia"
  file_prefix: "eia_grid_data"


# Open-Meteo Weather Sources
# Open-Meteo gives us both historical weather and live forecast weather.
open_meteo:
  enabled: true
  requires_account: false

  historical:
    enabled: true
    base_url: "https://archive-api.open-meteo.com/v1/archive"
    description: "Historical hourly weather for training and backtesting."
    raw_output_subdir: "data/raw/weather/open_meteo_historical"
    file_prefix: "open_meteo_historical"

    hourly_variables:
      - temperature_2m
      - relative_humidity_2m
      - dew_point_2m
      - apparent_temperature
      - precipitation
      - rain
      - snowfall
      - weather_code
      - cloud_cover
      - wind_speed_10m
      - wind_gusts_10m
      - surface_pressure

    query_defaults:
      timezone: "America/New_York"
      temperature_unit: "fahrenheit"
      wind_speed_unit: "mph"
      precipitation_unit: "inch"

  forecast:
    enabled: true
    base_url: "https://api.open-meteo.com/v1/forecast"
    description: "Live and next-hour weather forecast for inference."
    raw_output_subdir: "data/raw/weather/open_meteo_forecast"
    file_prefix: "open_meteo_forecast"

    current_variables:
      - temperature_2m
      - relative_humidity_2m
      - apparent_temperature
      - precipitation
      - weather_code
      - cloud_cover
      - wind_speed_10m

    hourly_variables:
      - temperature_2m
      - relative_humidity_2m
      - dew_point_2m
      - apparent_temperature
      - precipitation_probability
      - precipitation
      - rain
      - snowfall
      - weather_code
      - cloud_cover
      - wind_speed_10m
      - wind_gusts_10m
      - surface_pressure

    query_defaults:
      timezone: "America/New_York"
      forecast_days: 2
      past_days: 1
      temperature_unit: "fahrenheit"
      wind_speed_unit: "mph"
      precipitation_unit: "inch"


# National Weather Service Alerts
# NWS alerts help explain abnormal weather-driven forecast errors.
nws:
  enabled: true
  requires_account: false
  base_url: "https://api.weather.gov"
  description: "Weather alerts for storm, heat, cold, and abnormal weather flags."

  alerts:
    enabled: true
    endpoint_path: "/alerts/active"
    raw_output_subdir: "data/raw/weather/nws_alerts"
    file_prefix: "nws_alerts"

  query_defaults:
    user_agent_env_var: "NWS_USER_AGENT"
    area: "PA"


# Ingestion Settings
# These values control how often live scripts should pull new data.
ingestion:
  save_raw_responses: true
  save_format: "json"
  timestamp_format: "%Y%m%d_%H%M%S"

  live_refresh_minutes:
    open_meteo_forecast: 15
    nws_alerts: 15
    eia_grid_monitor: 60
    pjm_instantaneous_load: 5
    pjm_preliminary_load: 60
    pjm_seven_day_forecast: 60

  historical_backfill:
    default_start_date: "2023-01-01"
    default_end_date: "2025-12-31"
    max_days_per_request: 31


# Data Quality Settings
# These rules check whether an API response looks usable.
data_quality:
  minimum_rows_expected:
    open_meteo_forecast: 24
    open_meteo_historical: 24
    eia_grid_monitor: 24
    pjm_hourly_load_metered: 24
    pjm_hourly_load_preliminary: 24

  freshness_threshold_minutes:
    open_meteo_forecast: 60
    nws_alerts: 60
    eia_grid_monitor: 180
    pjm_instantaneous_load: 30
    pjm_preliminary_load: 180

  required_weather_columns:
    - time
    - temperature_2m
    - relative_humidity_2m

  required_eia_columns:
    - period
    - respondent
    - type
    - value

  required_load_columns:
    - datetime_beginning_ept
    - area